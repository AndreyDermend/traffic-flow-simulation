name: Sync frontend to portfolio site

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout traffic-flow-simulation
        uses: actions/checkout@v4

      - name: Checkout portfolio site
        uses: actions/checkout@v4
        with:
          repository: AndreyDermend/andreydermend.github.io
          token: ${{ secrets.PORTFOLIO_TOKEN }}
          path: portfolio

      - name: Copy frontend files to portfolio demo directory
        run: |
          mkdir -p portfolio/demo/traffic-sim
          cp frontend/index.html portfolio/demo/traffic-sim/index.html
          cp frontend/styles.css portfolio/demo/traffic-sim/styles.css
          cp frontend/app.js portfolio/demo/traffic-sim/app.js

      - name: Update nav links to relative paths for portfolio hosting
        run: |
          sed -i 's|https://andreydermend.github.io/|/|g' portfolio/demo/traffic-sim/index.html
          sed -i 's|https://andreydermend.github.io|/|g' portfolio/demo/traffic-sim/index.html

      - name: Commit and push to portfolio repo
        run: |
          cd portfolio
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add demo/traffic-sim/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: update traffic-flow-simulation demo from source repo"
            git push
          fi
