name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build C simulation engine
        run: make build

      - name: Smoke test engine output
        run: |
          ./sim-engine/bin/traffic_sim 300 42 > data/sample_run.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('data/sample_run.json').read_text())
          assert 'snapshots' in payload and len(payload['snapshots']) == 60
          print('Simulation JSON validated.')
          PY

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        env:
          PYTHONPATH: backend
        run: pytest backend/tests -q
